services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://analytics:analytics@postgres:5432/analytics
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # The Write-Behind consumer runs as a single dedicated process. Keep it at one
  # replica: LRANGE/LMOVE batching is reliable per-consumer, but several consumers
  # on the same queue would need per-consumer processing keys plus a reaper.
  worker:
    build: .
    command: ["python", "-m", "src.worker"]
    ports:
      - "9100:9100"  # Prometheus metrics (events_inserted_total, ...)
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://analytics:analytics@postgres:5432/analytics
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "/app/scripts/worker_healthcheck.py"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata:
